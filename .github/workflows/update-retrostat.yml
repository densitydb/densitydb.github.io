name: Update Retrostat

on:
  schedule:
    - cron: "0 6 * * 2" # Tuesday 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-retrostat:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout urbanstats
        uses: actions/checkout@v4
        with:
          repository: kavigupta/urbanstats
          path: urbanstats
          token: ${{ secrets.URBANSTATS_TOKEN }}

      - name: Push empty commit to urbanstats
        working-directory: urbanstats
        run: |
          echo "=== gh auth status ==="
          gh auth status

          echo "=== token scopes (via API) ==="
          curl -sI -H "Authorization: Bearer ${GH_TOKEN}" https://api.github.com/repos/kavigupta/urbanstats \
            | grep -i x-oauth-scopes

          echo "=== repo permissions ==="
          gh api /repos/kavigupta/urbanstats --jq '.permissions'

          echo "=== authenticated user ==="
          gh api /user --jq '.login'

          echo "=== git remote ==="
          git remote -v

          echo "=== git config credential ==="
          git config --list | grep -i credential || echo "(none)"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          BRANCH="auto-retrostat-$(date +%Y%m%d)"
          git checkout -b "$BRANCH"
          git commit --allow-empty -m "Test push"

          echo "=== setting remote url with token ==="
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/kavigupta/urbanstats.git"
          git remote -v

          echo "=== pushing ==="
          git push origin "$BRANCH" --verbose
        env:
          GH_TOKEN: ${{ secrets.URBANSTATS_TOKEN }}
